<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayaran Berjaya — Jaya Bina Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(180deg,#E8F5E9,#fff);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .card{background:#fff;border-radius:24px;padding:48px 36px;max-width:480px;width:100%;box-shadow:0 4px 40px rgba(0,0,0,.06)}
    .check{width:80px;height:80px;border-radius:50%;background:#E8F5E9;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:2.5rem}
    h1{font-size:1.5rem;color:#1B5E20;margin-bottom:8px}
    p{color:#555;font-size:.9rem;line-height:1.7;margin-bottom:12px}
    .info{background:#f9fafb;border-radius:12px;padding:16px;margin:24px 0;text-align:left;font-size:.82rem}
    .info .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
    .info .row:last-child{border:none}
    .info .k{color:#888}.info .v{color:#1a1a1a;font-weight:600}
    .btn{display:inline-block;padding:14px 36px;background:#2E7D32;color:#fff;border-radius:50px;font-weight:700;text-decoration:none;font-size:.9rem;transition:all .2s}
    .btn:hover{background:#1B5E20}
    .wa{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;background:#25D366;color:#fff;border-radius:50px;font-weight:700;text-decoration:none;font-size:.85rem;margin-top:12px}
    .wa:hover{background:#1da851}
  </style>
</head>
<body>
<div class="card">
  <div class="check">&#9989;</div>
  <h1>Bayaran Diterima!</h1>
  <p>Terima kasih. Deposit RM150 anda telah berjaya dibayar.</p>
  <p style="font-size:.78rem;color:#999">Kami akan hubungi anda dalam masa <strong>24 jam</strong> untuk pengesahan tarikh servis.</p>
  <div class="info">
    <div class="row"><span class="k">Ref</span><span class="v" id="ref">-</span></div>
    <div class="row"><span class="k">Servis</span><span class="v">Cuci Tangki Air</span></div>
    <div class="row"><span class="k">Deposit</span><span class="v">RM150</span></div>
    <div class="row"><span class="k">Baki</span><span class="v">RM150 (selepas servis)</span></div>
  </div>
  <a href="/" class="btn">&larr; Kembali ke Laman Utama</a>
  <br>
  <a href="https://wa.me/60000000000?text=Assalamualaikum%20Jaya%20Bina.%20Saya%20baru%20buat%20bayaran." class="wa" target="_blank">&#128172; WhatsApp Kami</a>
</div>

<script>
var params=new URLSearchParams(window.location.search);
var ref=params.get('ref');
if(ref)document.getElementById('ref').textContent=ref.substring(0,8)+'...';
</script>
</body>
</html>
